name: YOPmail Checker

on:
  workflow_dispatch:
    inputs:
      inbox:
        description: 'Имя ящика (без @yopmail.com)'
        required: true
      keywords:
        description: 'Ключевые слова (через запятую)'
        required: true

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install selenium

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run YOPmail checker
        run: |
          python3 yopmail_search.py "${{ github.event.inputs.inbox }}" "${{ github.event.inputs.keywords }}"
